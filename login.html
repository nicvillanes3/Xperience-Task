<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Xperience Task</title>
    <link rel="stylesheet" href="style.css">
</head>

<body id="loginFundo">
    <div class="login">
        <img src="logo_projeto.png" alt="Logo" width="20%" height="20%">
        <h1>Login</h1>
        <label for="usuario">Username</label>
        <input type="text" id="usuario" placeholder="Nome completo" required>

        <label for="senha">Password</label>
        <input type="password" id="senha" placeholder="Coloque sua senha" required>

        <button id="entrar">Entrar</button>
        <a href="#">Esqueceu a senha?</a>
    </div>

</body>

</html>
